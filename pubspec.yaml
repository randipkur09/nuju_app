name: nuju_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.0.0

  # Routing
  go_router: ^13.0.0

  # HTTP Client
  http: ^1.1.0
  dio: ^5.3.0

  # JSON Serialization
  json_annotation: ^4.8.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3

  # UI & Fonts
  google_fonts: ^6.1.0
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.63.0

  # Icons
  font_awesome_flutter: ^10.6.0

  # Date & Time
  timeago: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
